# HTTP Listener
http.port=8085
http.host=0.0.0.0

# Application
app.name=payment-sapi
app.version=1.0.0
app.log.category=com.example.oms.payment.sapi

# Payment Backend
payment.backend.baseUri=https://qa-payment-backend.example.com
payment.backend.path=/api/v1/payments

# Timeouts (ms)
payment.backend.connectionTimeout=5000
payment.backend.responseTimeout=10000
