# =============================================================================
# Order Experience API - Environment configuration (prod)
# =============================================================================

# HTTP Listener
http.port=8081
http.host=0.0.0.0

# Logging
app.name=order-xapi
app.version=1.0.0
app.log.category=com.example.oms.order.xapi

# Process API (outbound to order-papi)
process.api.host=order-papi.example.com
process.api.port=443
process.api.protocol=HTTPS
process.api.basePath=/api
process.api.connectionTimeout=5000
process.api.responseTimeout=10000
