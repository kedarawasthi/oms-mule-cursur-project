# =============================================================================
# Order Process API - Environment configuration (prod)
# =============================================================================

# HTTP Listener
http.port=8082
http.host=0.0.0.0

# Logging
app.name=order-papi
app.version=1.0.0
app.log.category=com.example.oms.order.papi

# System API: Customer
customer.host=customer-sapi.example.com
customer.port=443
customer.protocol=HTTPS
customer.basePath=/api
customer.connectionTimeout=5000
customer.responseTimeout=10000

# System API: Inventory
inventory.host=inventory-sapi.example.com
inventory.port=443
inventory.protocol=HTTPS
inventory.basePath=/api
inventory.connectionTimeout=5000
inventory.responseTimeout=10000

# System API: Payment
payment.host=payment-sapi.example.com
payment.port=443
payment.protocol=HTTPS
payment.basePath=/api
payment.connectionTimeout=5000
payment.responseTimeout=10000

# System API: OMS
oms.host=oms-sapi.example.com
oms.port=443
oms.protocol=HTTPS
oms.basePath=/api
oms.connectionTimeout=5000
oms.responseTimeout=10000

# System API: Shipping
shipping.host=shipping-sapi.example.com
shipping.port=443
shipping.protocol=HTTPS
shipping.basePath=/api
shipping.connectionTimeout=5000
shipping.responseTimeout=10000
